[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[tox]
envlist =
    py3{10, 11, 12, 13}
isolated_build = True
skip_missing_interpreters = True

[testenv]
extras =
  tests: tests
deps =
  pytest
  pytest-cov
  psutil
usedevelop = true
setenv =
commands =
  python -m pytest --doctest-modules --cov --cov-report xml:coverage.xml -k 'not integration' {posargs}
