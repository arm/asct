name: sdist

permissions:
  contents: write

on:
  schedule:
    - cron: '13 2 * * *'  # Runs nightly at 2:13 AM UTC
  workflow_dispatch:  # Allows manual triggering
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]  # Runs on pull requests

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - name: ⤵️ Checkout code
        uses: actions/checkout@v7

      - name: ⤵️ Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: ⤵️ Install pandoc
        run: |
          sudo apt-get install -y pandoc

      - name: ⤵️ Install build dependencies
        run: python -m pip install --upgrade pip setuptools build

      - name: 🚀 Build and rename sdist file with github PR number for PR builds
        if: github.event_name == 'pull_request'
        run: |
          # Get the latest commit SHA
          PR=${{ github.event.pull_request.number }}
          # Append dev.PR to version
          ./build.sh release --version-tag dev$PR

      - name: 🚀 Build and rename sdist file with git sha for on-demand builds
        if: github.event_name == 'workflow_dispatch'
        run: |
          ./build.sh release --version-tag dev0

      - name: ⤴️ Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist-package
          path: dist/*.tar.gz
