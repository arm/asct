name: compile-benchmarks-public

permissions:
  contents: write

# cancel any in-progress runs for the same pull request or branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:  # Allows manual triggering
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]  # Runs on pull requests

jobs:
  build-binaries:
    if: github.repository == 'Arm/asct'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    steps:
      - name: 🧹 Pre-checkout cleanup
        if: contains(matrix.os, 'self-hosted')
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            echo "Resetting workspace permissions before checkout..."
            sudo rm -rf "$GITHUB_WORKSPACE/.pytest_cache"
            sudo rm -rf "$GITHUB_WORKSPACE/test-results"
            sudo rm -rf "$GITHUB_WORKSPACE/data" "$GITHUB_WORKSPACE"/quick_results_* "$GITHUB_WORKSPACE/dist"
            sudo chown -hR "$USER:$USER" -- "$GITHUB_WORKSPACE"
          fi

      - name: ⤵️ Checkout code
        uses: actions/checkout@v7

      - name: ⤵️ Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: ⤵️ Install build dependencies
        run: python -m pip install --upgrade pip setuptools build

      - name: 🚀 Build binaries
        run: ./build.sh activate
