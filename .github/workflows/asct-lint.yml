# This workflow will install Python dependencies, run tests and lint with a single version of Python
# Will also do a check to see if the ruff file copyright years are up to date and direct to the update script if not
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: ASCT Lint Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - release-candidate/**
      - release/**
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  lint:

    runs-on: ubuntu-latest

    steps:
      - name: ⤵️ Checkout code
        uses: actions/checkout@v7

      - name: ⤵️ Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: ⤵️ Install Lint Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ github.workspace }}/requirements_dev.txt

      - name: 🔧 Update Ruff copyright config
        run: |
          chmod +x scripts/update_ruff_copyright.py
          ./scripts/update_ruff_copyright.py

      - name: 🔧 Update file copyright headers
        run: |
          chmod +x scripts/update_copyright_years.py
          ./scripts/update_copyright_years.py

      - name: ✅ Ensure tree is clean after copyright updates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Copyright update scripts modified files."
            echo "Run the following locally and commit the changes:"
            echo "  scripts/update_ruff_copyright.py"
            echo "  scripts/update_copyright_years.py"
            git diff
            exit 1
          else
            echo "No copyright changes needed."
          fi

      - name: ✅ Check licenses with reuse
        run: |
          chmod +x scripts/license_lint.sh
          ./scripts/license_lint.sh

      # Note: ruff settings are contained in pyproject.toml
      - name: 🚀 Lint check Python files with Ruff
        run: ruff check

      - name: 🚀 Lint format check Python files with Ruff
        run: |
          ruff --version
          ruff format --check

      # Note: yamllint settings are contained in .yamllint
      - name: 🚀 Lint check YAML files with Yamllint
        run: yamllint .

        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        continue-on-error: false
